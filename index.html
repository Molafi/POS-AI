<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POS-AI - Intelligent Point of Sale</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg: #080b14;
  --surface: #0f1422;
  --card: #161d2f;
  --card-hover: #1c2540;
  --accent: #7c6aff;
  --accent-light: #a78bfa;
  --accent-glow: rgba(124, 106, 255, 0.4);
  --success: #10b981;
  --success-glow: rgba(16, 185, 129, 0.3);
  --warning: #f59e0b;
  --danger: #ef4444;
  --danger-glow: rgba(239, 68, 68, 0.2);
  --text-primary: #f1f5f9;
  --text-secondary: #cbd5e1;
  --text-muted: #64748b;
  --border: rgba(124, 106, 255, 0.12);
  --border-hover: rgba(124, 106, 255, 0.3);
  --glass: rgba(15, 20, 34, 0.7);
  --glass-border: rgba(124, 106, 255, 0.15);
  --gradient-primary: linear-gradient(135deg, #7c6aff 0%, #a78bfa 50%, #c084fc 100%);
  --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
  --gradient-card: linear-gradient(145deg, rgba(22, 29, 47, 0.9), rgba(15, 20, 34, 0.95));
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 0 30px rgba(124, 106, 255, 0.15);
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-xl: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  background-image: 
    radial-gradient(ellipse at 20% 50%, rgba(124, 106, 255, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(167, 139, 250, 0.02) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(192, 132, 252, 0.02) 0%, transparent 50%);
}

#root { min-height: 100vh; }

@keyframes pulseRing {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.02); opacity: 1; }
}

@keyframes slideInRight {
  from { transform: translateX(20px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes slideInUp {
  from { transform: translateY(12px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes shimmer {
  0% { background-position: -200px 0; }
  100% { background-position: 200px 0; }
}

@keyframes checkmark {
  0% { stroke-dashoffset: 50; }
  100% { stroke-dashoffset: 0; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.92); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes fadeInScale {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 8px rgba(124, 106, 255, 0.2), inset 0 0 8px rgba(124, 106, 255, 0.05); }
  50% { box-shadow: 0 0 24px rgba(124, 106, 255, 0.4), inset 0 0 12px rgba(124, 106, 255, 0.1); }
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-4px); }
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes successPulse {
  0% { transform: scale(0.8); opacity: 0; }
  50% { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.mono { font-family: 'JetBrains Mono', monospace; }

button {
  cursor: pointer;
  border: none;
  outline: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

button:hover { transform: translateY(-2px) scale(1.02); }
button:active { transform: translateY(0) scale(0.97); }
button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: grayscale(0.3); }

input, select {
  outline: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.15), var(--shadow-sm);
}

input::placeholder { color: var(--text-muted); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(124, 106, 255, 0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(124, 106, 255, 0.5); }

.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, rgba(124, 106, 255, 0.08) 50%, var(--card) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: var(--radius-md);
}

.glass-panel {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
}

@media (max-width: 900px) {
  .main-layout {
    flex-direction: column !important;
  }
  .main-layout > div {
    width: 100% !important;
    max-height: none !important;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ============ SAMPLE DATA ============
const INITIAL_PRODUCTS = [
  { id: 1, name: "Burger Classic", price: 5.99, emoji: "\u{1F354}", category: "Food", stock: 20 },
  { id: 2, name: "Pepperoni Pizza", price: 8.49, emoji: "\u{1F355}", category: "Food", stock: 15 },
  { id: 3, name: "Cola Large", price: 1.99, emoji: "\u{1F964}", category: "Drinks", stock: 50 },
  { id: 4, name: "Espresso", price: 2.49, emoji: "\u2615", category: "Drinks", stock: 30 },
  { id: 5, name: "Vanilla Sundae", price: 3.29, emoji: "\u{1F366}", category: "Desserts", stock: 12 },
  { id: 6, name: "Meal Deal Combo", price: 10.99, emoji: "\u{1F381}", category: "Combos", stock: 8 },
  { id: 7, name: "Hand Sanitizer", price: 4.99, emoji: "\u{1F9F4}", category: "Retail", stock: 3 },
  { id: 8, name: "Fries Large", price: 2.79, emoji: "\u{1F35F}", category: "Food", stock: 25 },
  { id: 9, name: "Orange Juice", price: 2.19, emoji: "\u{1F9C3}", category: "Drinks", stock: 18 },
  { id: 10, name: "Cheesecake Slice", price: 4.49, emoji: "\u{1F370}", category: "Desserts", stock: 7 },
  { id: 11, name: "Chicken Wings", price: 6.99, emoji: "\u{1F357}", category: "Food", stock: 14 },
  { id: 12, name: "Iced Latte", price: 3.79, emoji: "\u{1F9CB}", category: "Drinks", stock: 22 },
  { id: 13, name: "Chocolate Cake", price: 4.99, emoji: "\u{1F382}", category: "Desserts", stock: 9 },
  { id: 14, name: "Family Bundle", price: 19.99, emoji: "\u{1F4E6}", category: "Combos", stock: 5 },
  { id: 15, name: "Water Bottle", price: 0.99, emoji: "\u{1F4A7}", category: "Drinks", stock: 60 },
  { id: 16, name: "Hot Dog", price: 3.49, emoji: "\u{1F32D}", category: "Food", stock: 18 },
  { id: 17, name: "Smoothie Berry", price: 4.29, emoji: "\u{1F353}", category: "Drinks", stock: 10 },
  { id: 18, name: "Donut Glazed", price: 1.89, emoji: "\u{1F369}", category: "Desserts", stock: 20 },
  { id: 19, name: "Snack Pack Combo", price: 7.49, emoji: "\u{1F37F}", category: "Combos", stock: 12 },
  { id: 20, name: "Phone Charger", price: 9.99, emoji: "\u{1F50C}", category: "Retail", stock: 4 }
];

const CATEGORIES = ["All", "Food", "Drinks", "Desserts", "Combos", "Retail"];
const TAX_RATE = 0.14;
const CUSTOMER_TIERS = { New: 0, Regular: 0.05, VIP: 0.10 };

// ============ ALGORITHMS ============

function levenshteinDistance(a, b) {
  const matrix = [];
  const aLen = a.length;
  const bLen = b.length;
  if (aLen === 0) return bLen;
  if (bLen === 0) return aLen;
  for (let i = 0; i <= bLen; i++) matrix[i] = [i];
  for (let j = 0; j <= aLen; j++) matrix[0][j] = j;
  for (let i = 1; i <= bLen; i++) {
    for (let j = 1; j <= aLen; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }
  return matrix[bLen][aLen];
}

function fuzzySearch(query, products) {
  if (!query.trim()) return products;
  const q = query.toLowerCase();
  return products
    .map(p => {
      const name = p.name.toLowerCase();
      if (name.includes(q)) return { ...p, score: 0 };
      const dist = levenshteinDistance(q, name.substring(0, q.length));
      return { ...p, score: dist };
    })
    .filter(p => p.score <= 3)
    .sort((a, b) => a.score - b.score);
}

function getCoOccurrenceRecommendations(cartItems, coMatrix, products, maxRecs = 3) {
  const cartIds = cartItems.map(i => i.id);
  if (cartIds.length === 0) return [];
  const scores = {};
  cartIds.forEach(id => {
    if (coMatrix[id]) {
      Object.entries(coMatrix[id]).forEach(([otherId, count]) => {
        const oid = parseInt(otherId);
        if (!cartIds.includes(oid)) {
          scores[oid] = (scores[oid] || 0) + count;
        }
      });
    }
  });
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, maxRecs);
  if (sorted.length < maxRecs) {
    const freq = JSON.parse(localStorage.getItem('pos_frequency') || '{}');
    const freqSorted = Object.entries(freq)
      .filter(([id]) => !cartIds.includes(parseInt(id)) && !sorted.find(s => s[0] === id))
      .sort((a, b) => b[1] - a[1]);
    while (sorted.length < maxRecs && freqSorted.length > 0) {
      sorted.push(freqSorted.shift());
    }
  }
  return sorted.map(([id]) => products.find(p => p.id === parseInt(id))).filter(Boolean);
}

// ============ MAIN APP ============
function App() {
  const [products, setProducts] = useState(() => {
    const saved = localStorage.getItem('pos_products');
    return saved ? JSON.parse(saved) : INITIAL_PRODUCTS;
  });
  const [cart, setCart] = useState(() => {
    const saved = localStorage.getItem('pos_cart');
    return saved ? JSON.parse(saved) : [];
  });
  const [category, setCategory] = useState("All");
  const [searchQuery, setSearchQuery] = useState("");
  const [customerTier, setCustomerTier] = useState(() => {
    return localStorage.getItem('pos_tier') || "New";
  });
  const [rightTab, setRightTab] = useState("payment");
  const [paymentMethod, setPaymentMethod] = useState("Cash");
  const [splitPayment, setSplitPayment] = useState(false);
  const [splitAmounts, setSplitAmounts] = useState({ method1: "Cash", method2: "Card", amount1: "", amount2: "" });
  const [cashTendered, setCashTendered] = useState("");
  const [orders, setOrders] = useState(() => {
    const saved = localStorage.getItem('pos_orders');
    return saved ? JSON.parse(saved) : [];
  });
  const [coMatrix, setCoMatrix] = useState(() => {
    const saved = localStorage.getItem('pos_coMatrix');
    return saved ? JSON.parse(saved) : {};
  });
  const [frequency, setFrequency] = useState(() => {
    const saved = localStorage.getItem('pos_frequency');
    return saved ? JSON.parse(saved) : {};
  });
  const [showSuccess, setShowSuccess] = useState(false);
  const [lastReceipt, setLastReceipt] = useState(null);
  const [selectedCartItem, setSelectedCartItem] = useState(null);
  const [showClearConfirm, setShowClearConfirm] = useState(false);
  const [loading, setLoading] = useState(true);
  const searchRef = useRef(null);

  // Loading skeleton
  useEffect(() => {
    const timer = setTimeout(() => setLoading(false), 300);
    return () => clearTimeout(timer);
  }, []);

  // Persist cart
  useEffect(() => {
    localStorage.setItem('pos_cart', JSON.stringify(cart));
  }, [cart]);

  // Persist products
  useEffect(() => {
    localStorage.setItem('pos_products', JSON.stringify(products));
  }, [products]);

  // Persist orders
  useEffect(() => {
    localStorage.setItem('pos_orders', JSON.stringify(orders));
  }, [orders]);

  // Persist tier
  useEffect(() => {
    localStorage.setItem('pos_tier', customerTier);
  }, [customerTier]);

  // Persist co-occurrence matrix
  useEffect(() => {
    localStorage.setItem('pos_coMatrix', JSON.stringify(coMatrix));
  }, [coMatrix]);

  // Persist frequency
  useEffect(() => {
    localStorage.setItem('pos_frequency', JSON.stringify(frequency));
  }, [frequency]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === '/') { e.preventDefault(); searchRef.current?.focus(); }
      if (e.key === 'Escape') { setSearchQuery(""); setShowClearConfirm(false); searchRef.current?.blur(); }
      if (e.key === 'Enter' && rightTab === 'payment' && cart.length > 0) { processPayment(); }
      if (e.key === 'c' || e.key === 'C') { if (cart.length > 0) setShowClearConfirm(true); }
      if (e.key >= '1' && e.key <= '9' && selectedCartItem !== null) {
        setCart(prev => prev.map(item =>
          item.id === selectedCartItem ? { ...item, quantity: parseInt(e.key) } : item
        ));
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [rightTab, cart, selectedCartItem]);

  // Filtered products
  const filteredProducts = useMemo(() => {
    let result = products;
    if (category !== "All") result = result.filter(p => p.category === category);
    if (searchQuery) result = fuzzySearch(searchQuery, result);
    return result;
  }, [products, category, searchQuery]);

  // Cart calculations
  const cartCalcs = useMemo(() => {
    const subtotal = cart.reduce((sum, item) => {
      const itemTotal = item.price * item.quantity;
      const discount = item.discount ? itemTotal * (item.discount / 100) : 0;
      return sum + (itemTotal - discount);
    }, 0);
    const tierDiscount = subtotal * CUSTOMER_TIERS[customerTier];
    const afterTierDiscount = subtotal - tierDiscount;
    const tax = afterTierDiscount * TAX_RATE;
    const total = afterTierDiscount + tax;
    return { subtotal, tierDiscount, afterTierDiscount, tax, total };
  }, [cart, customerTier]);

  // AI Recommendations
  const recommendations = useMemo(() => {
    return getCoOccurrenceRecommendations(cart, coMatrix, products);
  }, [cart, coMatrix, products]);

  const addToCart = useCallback((product) => {
    if (product.stock <= 0) return;
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) {
        return prev.map(i => i.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
      }
      return [...prev, { id: product.id, name: product.name, price: product.price, emoji: product.emoji, quantity: 1, discount: 0 }];
    });
    setSelectedCartItem(product.id);
    // Update frequency
    setFrequency(prev => ({ ...prev, [product.id]: (prev[product.id] || 0) + 1 }));
  }, []);

  const removeFromCart = useCallback((id) => {
    setCart(prev => prev.filter(i => i.id !== id));
    if (selectedCartItem === id) setSelectedCartItem(null);
  }, [selectedCartItem]);

  const updateQuantity = useCallback((id, delta) => {
    setCart(prev => prev.map(item => {
      if (item.id === id) {
        const newQty = item.quantity + delta;
        if (newQty <= 0) return null;
        return { ...item, quantity: newQty };
      }
      return item;
    }).filter(Boolean));
  }, []);

  const updateDiscount = useCallback((id, discount) => {
    const val = Math.min(100, Math.max(0, parseFloat(discount) || 0));
    setCart(prev => prev.map(item => item.id === id ? { ...item, discount: val } : item));
  }, []);

  const clearCart = useCallback(() => {
    setCart([]);
    setSelectedCartItem(null);
    setShowClearConfirm(false);
  }, []);

  const processPayment = useCallback(() => {
    if (cart.length === 0) return;
    // Update co-occurrence matrix
    const cartIds = cart.map(i => i.id);
    const newMatrix = { ...coMatrix };
    for (let i = 0; i < cartIds.length; i++) {
      for (let j = i + 1; j < cartIds.length; j++) {
        const a = cartIds[i], b = cartIds[j];
        if (!newMatrix[a]) newMatrix[a] = {};
        if (!newMatrix[b]) newMatrix[b] = {};
        newMatrix[a][b] = (newMatrix[a][b] || 0) + 1;
        newMatrix[b][a] = (newMatrix[b][a] || 0) + 1;
      }
    }
    setCoMatrix(newMatrix);

    // Deduct stock
    setProducts(prev => prev.map(p => {
      const cartItem = cart.find(c => c.id === p.id);
      if (cartItem) return { ...p, stock: Math.max(0, p.stock - cartItem.quantity) };
      return p;
    }));

    // Create order
    const order = {
      id: Date.now(),
      items: [...cart],
      subtotal: cartCalcs.subtotal,
      tierDiscount: cartCalcs.tierDiscount,
      tax: cartCalcs.tax,
      total: cartCalcs.total,
      paymentMethod: splitPayment ? `${splitAmounts.method1} + ${splitAmounts.method2}` : paymentMethod,
      customerTier,
      timestamp: new Date().toISOString(),
      hour: new Date().getHours()
    };

    const receipt = { ...order };
    setLastReceipt(receipt);
    setOrders(prev => [order, ...prev].slice(0, 50));
    setCart([]);
    setSelectedCartItem(null);
    setCashTendered("");
    setShowSuccess(true);
    setTimeout(() => setShowSuccess(false), 3000);
  }, [cart, coMatrix, cartCalcs, paymentMethod, splitPayment, splitAmounts, customerTier]);

  const refundOrder = useCallback((orderId) => {
    const order = orders.find(o => o.id === orderId);
    if (!order) return;
    // Restore stock
    setProducts(prev => prev.map(p => {
      const item = order.items.find(i => i.id === p.id);
      if (item) return { ...p, stock: p.stock + item.quantity };
      return p;
    }));
    setOrders(prev => prev.filter(o => o.id !== orderId));
  }, [orders]);

  // Analytics data
  const analyticsData = useMemo(() => {
    const today = new Date().toDateString();
    const todayOrders = orders.filter(o => new Date(o.timestamp).toDateString() === today);
    const totalRevenue = todayOrders.reduce((sum, o) => sum + o.total, 0);
    const orderCount = todayOrders.length;
    const avgOrder = orderCount > 0 ? totalRevenue / orderCount : 0;

    // Top sellers
    const itemCounts = {};
    todayOrders.forEach(o => {
      o.items.forEach(item => {
        itemCounts[item.name] = (itemCounts[item.name] || 0) + item.quantity;
      });
    });
    const topSellers = Object.entries(itemCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

    // Hourly heatmap
    const hourly = new Array(24).fill(0);
    todayOrders.forEach(o => { hourly[o.hour] = (hourly[o.hour] || 0) + 1; });

    return { totalRevenue, orderCount, avgOrder, topSellers, hourly };
  }, [orders]);

  const changeAmount = useMemo(() => {
    const tendered = parseFloat(cashTendered) || 0;
    return tendered - cartCalcs.total;
  }, [cashTendered, cartCalcs.total]);

  // ============ RENDER ============
  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <header className="glass-panel" style={{
        padding: '16px 32px',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        borderBottom: '1px solid var(--border)',
        position: 'relative',
        zIndex: 10
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
          <div style={{ 
            width: 42, height: 42, borderRadius: '14px', 
            background: 'var(--gradient-primary)', 
            display: 'flex', alignItems: 'center', justifyContent: 'center', 
            fontWeight: 800, fontSize: '15px', color: '#fff',
            boxShadow: '0 4px 15px rgba(124, 106, 255, 0.4)',
            letterSpacing: '-0.5px'
          }}>AI</div>
          <div>
            <h1 style={{ fontSize: '20px', fontWeight: 800, letterSpacing: '-0.5px', background: 'var(--gradient-primary)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>POS-AI</h1>
            <span style={{ color: 'var(--text-muted)', fontSize: '11px', fontWeight: 500, letterSpacing: '0.5px' }}>Intelligent Point of Sale</span>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '20px' }}>
          <span style={{ fontSize: '11px', color: 'var(--text-muted)', opacity: 0.7, fontWeight: 400 }}>/ search &bull; Esc clear &bull; 1-9 qty &bull; C clear cart</span>
          <div style={{ display: 'flex', gap: '6px' }}>
            {Object.keys(CUSTOMER_TIERS).map(tier => (
              <button key={tier} onClick={() => setCustomerTier(tier)} style={{
                padding: '6px 16px',
                borderRadius: '20px',
                fontSize: '12px',
                fontWeight: 600,
                background: customerTier === tier ? 'var(--gradient-primary)' : 'var(--card)',
                color: customerTier === tier ? '#fff' : 'var(--text-muted)',
                boxShadow: customerTier === tier ? '0 4px 12px rgba(124, 106, 255, 0.3)' : 'none',
                border: customerTier === tier ? 'none' : '1px solid var(--border)'
              }}>{tier}</button>
            ))}
          </div>
        </div>
      </header>

      {/* Main Layout */}
      <div className="main-layout" style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>

        {/* LEFT PANEL - Products */}
        <div style={{ width: '37%', display: 'flex', flexDirection: 'column', borderRight: '1px solid var(--border)', overflow: 'hidden', background: 'rgba(8, 11, 20, 0.5)' }}>
          {/* Search */}
          <div style={{ padding: '20px 24px 16px' }}>
            <div style={{ position: 'relative' }}>

                    padding: '20px 14px',

                    flexDirection: 'column',
                    alignItems: 'center',
                    gap: '10px',

                    border: '1px solid var(--border)',

                    e.currentTarget.style.boxShadow = 'var(--shadow-sm)';
                    e.currentTarget.style.background = 'var(--gradient-card)';

                    <span style={{ position: 'absolute', top: '8px', right: '8px', background: 'linear-gradient(135deg, #f59e0b, #fbbf24)', color: '#000', fontSize: '9px', fontWeight: 700, padding: '3px 8px', borderRadius: '6px', boxShadow: '0 2px 8px rgba(245, 158, 11, 0.3)' }}>Low</span>

                  <span style={{ fontSize: '10px', color: 'var(--text-muted)', fontWeight: 500 }}>Stock: {product.stock}</span>
                </button>

              </div>

                  key={item.id}
                  onClick={() => setSelectedCartItem(item.id)}

                    display: 'flex',
                    alignItems: 'center',
                    gap: '14px',
                    padding: '14px 16px',
                    marginBottom: '10px',
                    borderRadius: 'var(--radius-md)',
                    background: selectedCartItem === item.id ? 'rgba(124, 106, 255, 0.12)' : 'var(--card)',

                    animation: `slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) ${idx * 0.05}s both`,
                    cursor: 'pointer',
                    position: 'relative',
                    boxShadow: selectedCartItem === item.id ? '0 4px 16px rgba(124, 106, 255, 0.15)' : 'var(--shadow-sm)',
                    transition: 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)'

                  <span style={{ fontSize: '28px' }}>{item.emoji}</span>

                      style={{ width: '40px', padding: '5px 4px', fontSize: '11px', borderRadius: '8px', textAlign: 'center', background: 'var(--surface)' }}

                    <button onClick={(e) => { e.stopPropagation(); updateQuantity(item.id, 1); }} style={{ width: '32px', height: '32px', borderRadius: '10px', background: 'var(--surface)', color: 'var(--text-primary)', fontSize: '16px', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1px solid var(--border)' }}>+</button>
                    <button onClick={(e) => { e.stopPropagation(); removeFromCart(item.id); }} style={{ width: '32px', height: '32px', borderRadius: '10px', background: 'var(--danger-glow)', color: 'var(--danger)', fontSize: '13px', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(239, 68, 68, 0.2)' }}>{'\u2715'}</button>
                  </div>

                      padding: '6px 14px',
                      borderRadius: '20px',
                      background: 'rgba(124, 106, 255, 0.1)',
                      border: '1px solid rgba(124, 106, 255, 0.25)',
                      color: 'var(--text-primary)',
                      fontSize: '12px',
                      fontWeight: 500,
                      display: 'flex',
                      alignItems: 'center',
                      gap: '6px',

                    <span>{rec.name}</span>
                    <span className="mono" style={{ color: 'var(--accent-light)', fontSize: '11px', fontWeight: 600 }}>${rec.price.toFixed(2)}</span>

              </div>
            </div>

                <span style={{ color: 'var(--text-muted)' }}>Subtotal</span>
                <span className="mono" style={{ fontWeight: 500 }}>${cartCalcs.subtotal.toFixed(2)}</span>

                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', marginBottom: '8px', color: 'var(--success)' }}>

                  <span className="mono" style={{ fontWeight: 600 }}>-${cartCalcs.tierDiscount.toFixed(2)}</span>
                </div>

              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', marginBottom: '8px' }}>
                <span style={{ color: 'var(--text-muted)' }}>Tax (14%)</span>
                <span className="mono" style={{ fontWeight: 500 }}>${cartCalcs.tax.toFixed(2)}</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '18px', fontWeight: 800, paddingTop: '12px', borderTop: '1px solid var(--border)', letterSpacing: '-0.3px' }}>

                <span className="mono" style={{ background: 'var(--gradient-primary)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>${cartCalcs.total.toFixed(2)}</span>

            </div>

                padding: '14px 8px 12px',
                fontSize: '12px',
                fontWeight: 600,
                background: 'transparent',
                color: rightTab === tab.id ? 'var(--accent-light)' : 'var(--text-muted)',
                borderBottom: rightTab === tab.id ? '2px solid var(--accent)' : '2px solid transparent',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                gap: '6px',
                letterSpacing: '0.2px'

                <span style={{ fontSize: '14px' }}>{tab.icon}</span>
                {tab.label}
              </button>

          </div>

          <div style={{ flex: 1, overflow: 'auto', padding: '20px' }}>
            {/* PAYMENT TAB */}
            {rightTab === 'payment' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                {/* Customer Tier */}
                <div>
                  <label style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '10px', display: 'block' }}>Customer Tier</label>
                  <div style={{ display: 'flex', gap: '8px' }}>
                    {Object.keys(CUSTOMER_TIERS).map(tier => (
                      <button key={tier} onClick={() => setCustomerTier(tier)} style={{
                        flex: 1,
                        padding: '10px',
                        borderRadius: 'var(--radius-sm)',
                        fontSize: '12px',
                        fontWeight: 600,
                        background: customerTier === tier ? (tier === 'VIP' ? 'linear-gradient(135deg, #7c6aff, #a78bfa, #c084fc)' : tier === 'Regular' ? 'var(--gradient-success)' : 'var(--card)') : 'var(--card)',
                        color: customerTier === tier ? '#fff' : 'var(--text-muted)',
                        border: customerTier === tier ? 'none' : '1px solid var(--border)',
                        boxShadow: customerTier === tier ? (tier === 'VIP' ? '0 4px 16px rgba(124, 106, 255, 0.3)' : tier === 'Regular' ? '0 4px 16px rgba(16, 185, 129, 0.3)' : 'none') : 'none'
                      }}>{tier} {tier !== 'New' && `(${CUSTOMER_TIERS[tier]*100}%)`}</button>

                </div>

                    {[{m:'Cash', e:'\u{1F4B5}'}, {m:'Card', e:'\u{1F4B3}'}, {m:'Wallet', e:'\u{1F4F1}'}].map(({m, e}) => (
                      <button key={m} onClick={() => setPaymentMethod(m)} style={{
                        flex: 1,
                        padding: '14px 10px',
                        borderRadius: 'var(--radius-md)',
                        fontSize: '12px',
                        fontWeight: 600,
                        background: paymentMethod === m && !splitPayment ? 'rgba(124, 106, 255, 0.15)' : 'var(--card)',
                        color: paymentMethod === m && !splitPayment ? 'var(--accent-light)' : 'var(--text-muted)',
                        display: 'flex',
                        flexDirection: 'column',
                        alignItems: 'center',
                        gap: '8px',
                        border: paymentMethod === m && !splitPayment ? '1px solid rgba(124, 106, 255, 0.4)' : '1px solid var(--border)',
                        boxShadow: paymentMethod === m && !splitPayment ? '0 4px 12px rgba(124, 106, 255, 0.15)' : 'none'

                        <span style={{ fontSize: '24px' }}>{e}</span>
                        <span>{m}</span>

                </div>

                    width: '100%',
                    padding: '12px',
                    borderRadius: 'var(--radius-sm)',
                    fontSize: '13px',

                    background: splitPayment ? 'rgba(124, 106, 255, 0.12)' : 'var(--card)',

                        <option>Cash</option><option>Card</option><option>Wallet</option>
                      </select>
                      <input type="number" placeholder="Amount" value={splitAmounts.amount1} onChange={(e) => setSplitAmounts(p => ({...p, amount1: e.target.value}))} style={{ width: '90px', padding: '10px', fontSize: '13px', borderRadius: '10px' }} />
                    </div>
                    <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                      <select value={splitAmounts.method2} onChange={(e) => setSplitAmounts(p => ({...p, method2: e.target.value}))} style={{ flex: 1, padding: '10px', borderRadius: '10px', background: 'var(--surface)', color: 'var(--text-primary)', border: '1px solid var(--border)', fontSize: '12px' }}>
                        <option>Cash</option><option>Card</option><option>Wallet</option>
                      </select>
                      <input type="number" placeholder="Amount" value={splitAmounts.amount2} onChange={(e) => setSplitAmounts(p => ({...p, amount2: e.target.value}))} style={{ width: '90px', padding: '10px', fontSize: '13px', borderRadius: '10px' }} />
                    </div>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', textAlign: 'center', padding: '6px 0', borderTop: '1px solid var(--border)', marginTop: '4px' }}>
                      Total: ${cartCalcs.total.toFixed(2)} | Split: ${(parseFloat(splitAmounts.amount1)||0).toFixed(2)} + ${(parseFloat(splitAmounts.amount2)||0).toFixed(2)}
                    </div>
                  </div>

                {/* Cash Tendered */}
                {paymentMethod === 'Cash' && !splitPayment && (
                  <div>
                    <label style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '10px', display: 'block' }}>Cash Tendered</label>
                    <input
                      type="number"
                      value={cashTendered}
                      onChange={(e) => setCashTendered(e.target.value)}
                      placeholder="0.00"
                      style={{ width: '100%', padding: '14px 16px', fontSize: '18px', borderRadius: 'var(--radius-md)', fontFamily: 'JetBrains Mono', background: 'var(--card)', border: '1px solid var(--border)' }}
                    />
                    {cashTendered && (
                      <div className="mono" style={{ marginTop: '10px', fontSize: '15px', color: changeAmount >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight: 700, padding: '10px 14px', background: changeAmount >= 0 ? 'rgba(16, 185, 129, 0.08)' : 'rgba(239, 68, 68, 0.08)', borderRadius: 'var(--radius-sm)', border: `1px solid ${changeAmount >= 0 ? 'rgba(16, 185, 129, 0.2)' : 'rgba(239, 68, 68, 0.2)'}` }}>
                        Change: ${changeAmount.toFixed(2)}
                      </div>
                    )}
                  </div>
                )}

                {/* Order Summary */}
                {cart.length > 0 && (
                  <div style={{ padding: '16px', background: 'var(--card)', borderRadius: 'var(--radius-md)', border: '1px solid var(--border)' }}>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '12px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px' }}>Order Summary</div>
                    {cart.map(item => (
                      <div key={item.id} style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '8px', padding: '4px 0' }}>
                        <span style={{ color: 'var(--text-secondary)' }}>{item.emoji} {item.name} x{item.quantity}</span>
                        <span className="mono" style={{ fontWeight: 600 }}>${(item.price * item.quantity * (1 - (item.discount||0)/100)).toFixed(2)}</span>
                      </div>
                    ))}
                    <div style={{ borderTop: '1px solid var(--border)', marginTop: '10px', paddingTop: '12px', display: 'flex', justifyContent: 'space-between', fontWeight: 800, fontSize: '15px' }}>
                      <span>Total</span>
                      <span className="mono" style={{ color: 'var(--accent-light)' }}>${cartCalcs.total.toFixed(2)}</span>
                    </div>
                  </div>
                )}

                <button
                  onClick={processPayment}
                  disabled={cart.length === 0}
                  style={{
                    width: '100%',
                    padding: '18px',
                    borderRadius: 'var(--radius-md)',
                    background: cart.length > 0 ? 'var(--gradient-primary)' : 'var(--card)',
                    backgroundSize: '200% 200%',
                    animation: cart.length > 0 ? 'gradientShift 4s ease infinite' : 'none',
                    color: cart.length > 0 ? '#fff' : 'var(--text-muted)',
                    fontSize: '15px',
                    fontWeight: 700,
                    letterSpacing: '0.5px',
                    boxShadow: cart.length > 0 ? '0 8px 30px rgba(124, 106, 255, 0.35)' : 'none',
                    border: cart.length > 0 ? 'none' : '1px solid var(--border)'
                  }}
                >
                  {cart.length > 0 ? '\u2728 Process Payment (Enter)' : 'Add items to proceed'}
                </button>
              </div>
            )}

            {/* ORDERS TAB */}
            {rightTab === 'orders' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                <h3 style={{ fontSize: '16px', fontWeight: 700, color: 'var(--text-primary)', letterSpacing: '-0.3px' }}>Recent Orders</h3>
                {orders.length === 0 ? (
                  <div style={{ textAlign: 'center', padding: '60px 20px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '12px' }}>
                    <span style={{ fontSize: '48px', opacity: 0.2, animation: 'float 4s ease-in-out infinite' }}>{'\u{1F4CB}'}</span>
                    <span style={{ color: 'var(--text-muted)', fontSize: '14px', fontWeight: 500 }}>No orders yet</span>
                    <span style={{ color: 'var(--text-muted)', fontSize: '12px', opacity: 0.6 }}>Completed orders will appear here</span>
                  </div>
                ) : (
                  orders.slice(0, 5).map((order, idx) => (
                    <div key={order.id} style={{ background: 'var(--card)', borderRadius: 'var(--radius-md)', padding: '16px', border: '1px solid var(--border)', animation: `fadeInScale 0.3s cubic-bezier(0.4, 0, 0.2, 1) ${idx * 0.05}s both` }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px', alignItems: 'center' }}>
                        <span style={{ fontSize: '12px', color: 'var(--text-muted)', fontWeight: 500 }}>
                          {new Date(order.timestamp).toLocaleTimeString()}
                        </span>
                        <span className="mono" style={{ fontSize: '15px', fontWeight: 700, color: 'var(--accent-light)' }}>
                          ${order.total.toFixed(2)}
                        </span>
                      </div>
                      <div style={{ fontSize: '12px', marginBottom: '10px', color: 'var(--text-secondary)', lineHeight: '1.5' }}>
                        {order.items.map(i => `${i.emoji} ${i.name} x${i.quantity}`).join(', ')}
                      </div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <span style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 500 }}>
                          {order.paymentMethod} | {order.customerTier}
                        </span>
                        <button onClick={() => refundOrder(order.id)} style={{
                          padding: '6px 14px',
                          borderRadius: '8px',
                          background: 'var(--danger-glow)',
                          color: 'var(--danger)',
                          fontSize: '11px',
                          fontWeight: 600,
                          border: '1px solid rgba(239, 68, 68, 0.2)'
                        }}>Refund</button>
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {/* ANALYTICS TAB */}
            {rightTab === 'analytics' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                {/* Stat Cards */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px' }}>
                  <div style={{ background: 'var(--card)', borderRadius: 'var(--radius-md)', padding: '16px 12px', textAlign: 'center', border: '1px solid var(--border)' }}>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '8px', fontWeight: 600 }}>Revenue</div>
                    <div className="mono" style={{ fontSize: '16px', fontWeight: 800, color: 'var(--success)' }}>${analyticsData.totalRevenue.toFixed(2)}</div>
                  </div>
                  <div style={{ background: 'var(--card)', borderRadius: 'var(--radius-md)', padding: '16px 12px', textAlign: 'center', border: '1px solid var(--border)' }}>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '8px', fontWeight: 600 }}>Orders</div>
                    <div className="mono" style={{ fontSize: '16px', fontWeight: 800, color: 'var(--accent-light)' }}>{analyticsData.orderCount}</div>
                  </div>
                  <div style={{ background: 'var(--card)', borderRadius: 'var(--radius-md)', padding: '16px 12px', textAlign: 'center', border: '1px solid var(--border)' }}>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '8px', fontWeight: 600 }}>Avg Order</div>
                    <div className="mono" style={{ fontSize: '16px', fontWeight: 800, color: 'var(--warning)' }}>${analyticsData.avgOrder.toFixed(2)}</div>
                  </div>
                </div>

                {/* Top Sellers SVG Bar Chart */}
                <div>
                  <h4 style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '12px', fontWeight: 700 }}>Top 5 Sellers</h4>
                  {analyticsData.topSellers.length === 0 ? (
                    <div style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: '12px', padding: '30px 0', opacity: 0.7 }}>No sales data yet</div>
                  ) : (
                    <svg width="100%" height={analyticsData.topSellers.length * 36 + 10} style={{ overflow: 'visible' }}>
                      {analyticsData.topSellers.map(([name, count], i) => {
                        const maxCount = analyticsData.topSellers[0][1];
                        const barWidth = maxCount > 0 ? (count / maxCount) * 100 : 0;
                        return (
                          <g key={name} transform={`translate(0, ${i * 36})`}>
                            <rect x="0" y="4" width={`${barWidth}%`} height="22" rx="6" fill="url(#barGradient)" opacity="0.8" />
                            <defs><linearGradient id="barGradient" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#7c6aff" /><stop offset="100%" stopColor="#a78bfa" /></linearGradient></defs>
                            <text x="8" y="19" fontSize="11" fill="var(--text-primary)" fontFamily="Inter" fontWeight="500">{name}</text>
                            <text x="95%" y="19" fontSize="11" fill="var(--text-muted)" fontFamily="JetBrains Mono" textAnchor="end" fontWeight="600">{count}</text>
                          </g>
                        );
                      })}
                    </svg>
                  )}
                </div>

                {/* Hourly Heatmap */}
                <div>
                  <h4 style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '12px', fontWeight: 700 }}>Hourly Sales Heatmap</h4>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(12, 1fr)', gap: '4px' }}>
                    {analyticsData.hourly.map((count, hour) => {
                      const maxHourly = Math.max(...analyticsData.hourly, 1);
                      const intensity = count / maxHourly;
                      return (
                        <div key={hour} title={`${hour}:00 - ${count} orders`} style={{
                          aspectRatio: '1',
                          borderRadius: '6px',
                          background: count === 0 ? 'var(--card)' : `rgba(124, 106, 255, ${0.15 + intensity * 0.85})`,
                          display: 'flex',
                          alignItems: 'center',
                          justifyContent: 'center',
                          fontSize: '9px',
                          color: count > 0 ? '#fff' : 'var(--text-muted)',
                          fontWeight: count > 0 ? '600' : '400',
                          border: '1px solid var(--border)',
                          transition: 'all 0.2s'
                        }}>
                          {hour}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Payment Success Overlay */}
      {showSuccess && (
        <div style={{
          position: 'fixed',
          inset: 0,
          background: 'rgba(8, 11, 20, 0.97)',
          backdropFilter: 'blur(20px)',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          zIndex: 1000,
          animation: 'fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1)'
        }}>
          <div style={{ animation: 'successPulse 0.6s cubic-bezier(0.4, 0, 0.2, 1)' }}>
            <svg width="100" height="100" viewBox="0 0 50 50">
              <circle cx="25" cy="25" r="23" fill="none" stroke="var(--success)" strokeWidth="2" opacity="0.3" />
              <circle cx="25" cy="25" r="20" fill="rgba(16, 185, 129, 0.1)" />
              <path
                d="M14 26 L22 34 L36 18"
                fill="none"
                stroke="var(--success)"
                strokeWidth="3"
                strokeLinecap="round"
                strokeLinejoin="round"
                strokeDasharray="50"
                style={{ animation: 'checkmark 0.6s ease forwards 0.2s', strokeDashoffset: 50 }}
              />
            </svg>
          </div>
          <h2 style={{ marginTop: '24px', fontSize: '24px', fontWeight: 800, color: 'var(--success)', letterSpacing: '-0.5px' }}>Payment Successful!</h2>
          <p style={{ marginTop: '8px', fontSize: '13px', color: 'var(--text-muted)' }}>Transaction completed</p>
          {lastReceipt && (
            <div style={{ marginTop: '24px', padding: '24px', background: 'var(--card)', borderRadius: 'var(--radius-lg)', width: '320px', maxHeight: '350px', overflow: 'auto', border: '1px solid var(--border)', boxShadow: 'var(--shadow-lg)' }}>
              <div style={{ textAlign: 'center', fontSize: '11px', color: 'var(--text-muted)', marginBottom: '14px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1.5px' }}>Receipt</div>
              {lastReceipt.items.map(item => (
                <div key={item.id} style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '6px', padding: '3px 0' }}>
                  <span style={{ color: 'var(--text-secondary)' }}>{item.emoji} {item.name} x{item.quantity}</span>
                  <span className="mono" style={{ fontWeight: 600 }}>${(item.price * item.quantity * (1 - (item.discount||0)/100)).toFixed(2)}</span>
                </div>
              ))}
              <div style={{ borderTop: '1px dashed var(--border)', margin: '12px 0' }} />
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '4px' }}>
                <span style={{ color: 'var(--text-muted)' }}>Subtotal</span><span className="mono">${lastReceipt.subtotal.toFixed(2)}</span>
              </div>
              {lastReceipt.tierDiscount > 0 && (
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '4px', color: 'var(--success)' }}>
                  <span>Tier Discount</span><span className="mono" style={{ fontWeight: 600 }}>-${lastReceipt.tierDiscount.toFixed(2)}</span>
                </div>
              )}
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '4px' }}>
                <span style={{ color: 'var(--text-muted)' }}>Tax (14%)</span><span className="mono">${lastReceipt.tax.toFixed(2)}</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '16px', fontWeight: 800, marginTop: '10px', paddingTop: '10px', borderTop: '1px dashed var(--border)' }}>
                <span>Total</span><span className="mono" style={{ color: 'var(--accent-light)' }}>${lastReceipt.total.toFixed(2)}</span>
              </div>
              <div style={{ borderTop: '1px dashed var(--border)', margin: '12px 0' }} />
              <div style={{ fontSize: '11px', color: 'var(--text-muted)', textAlign: 'center' }}>
                <div style={{ marginBottom: '4px' }}>{lastReceipt.paymentMethod} | {lastReceipt.customerTier}</div>
                <div>{new Date(lastReceipt.timestamp).toLocaleString()}</div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
